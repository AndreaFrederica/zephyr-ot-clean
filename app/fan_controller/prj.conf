# ============================================
# ESP32-S3 Fan Controller - Zephyr Configuration
# Board: ESP32-S3-WROOM-N16R8 (8MB PSRAM, 320KB SRAM)
# ============================================

# --------------------------------------------
# Basic System
# --------------------------------------------
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CPP=y
CONFIG_REBOOT=y

# --------------------------------------------
# Hardware Peripherals
# --------------------------------------------
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# --------------------------------------------
# PSRAM Configuration (8MB External RAM)
# Revert to the last known-good shape first.
# --------------------------------------------
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y

# --------------------------------------------
# Network Stack (Buffers in PSRAM via noinit section)
# Total PSRAM usage: ~100KB
#   - RX: 24 x 1800 = 43KB
#   - TX: 24 x 1800 = 43KB
#   - PKT: minimal (in DRAM)
# --------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_OPTION_NTP_SERVER=y
CONFIG_SNTP=y

# Network interfaces
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_IF_MAX_IPV6_COUNT=1

# Packet buffers (small, in DRAM)
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32

# Data buffers (large, moved to PSRAM via linker script)
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
# Support large packets
CONFIG_NET_BUF_DATA_SIZE=2048

# Network event handling
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_STACK_SIZE=6144
CONFIG_NET_TX_STACK_SIZE=6144
CONFIG_NET_RX_STACK_SIZE=6144
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=6144
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096

# --------------------------------------------
# WiFi Configuration (PSRAM enabled)
# --------------------------------------------
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y

# WiFi memory from PSRAM
CONFIG_ESP_WIFI_HEAP_SPIRAM=y
CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=y

# Match the earlier known-good SPIRAM profile first.
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=24
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=96
CONFIG_ESP32_WIFI_STATIC_TX_BUFFER=y
CONFIG_ESP32_WIFI_STATIC_TX_BUFFER_NUM=32
CONFIG_ESP32_WIFI_CACHE_TX_BUFFER_NUM=24

# --------------------------------------------
# File System (LittleFS on Flash)
# --------------------------------------------
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FILE=y
CONFIG_SETTINGS_FILE_PATH="/lfs/var/lib/fanctl/settings.bin"
CONFIG_FS_LITTLEFS_CACHE_SIZE=512
CONFIG_FS_LITTLEFS_LOOKAHEAD_SIZE=128

# --------------------------------------------
# Shell
# --------------------------------------------
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_CMD_BUFF_SIZE=256
CONFIG_SHELL_PROMPT_CHANGE=y
CONFIG_SHELL_PROMPT_BUFF_SIZE=40
CONFIG_KERNEL_SHELL=y
CONFIG_SHELL_TAB=y
CONFIG_SHELL_TAB_AUTOCOMPLETION=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_SHELL_STACK_SIZE=8192

# --------------------------------------------
# wolfSSH
# --------------------------------------------
CONFIG_POSIX_API=y
CONFIG_WOLFSSH=y
CONFIG_WOLFSSH_SETTINGS_FILE="wolfssh_user_settings.h"

# --------------------------------------------
# Logging
# --------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_PICOLIBC_IO_FLOAT=y

# --------------------------------------------
# Memory Configuration (Internal DRAM: ~320KB)
# Layout:
#   - Stacks: ~80KB
#   - BSS/Data: ~80KB  
#   - Heap: 64KB (wolfSSH + WiFi init)
#   - Network noinit: moved to PSRAM
# --------------------------------------------
# Internal heap for WiFi init
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=6144
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_SENTINEL=y
