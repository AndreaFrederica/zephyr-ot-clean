[workspace]
authors = ["AndreaFrederica <andreafrederica@outlook.com>"]
channels = ["conda-forge"]
name = "zephyr-ot"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
walle_g_helloworld_c = "west build -b walle_g_fpga -d walle_g_build -p always zephyr/samples/hello_world"
walle_g_helloworld = "west build -b walle_g_fpga -d walle_g_build zephyr/samples/hello_world"
fan_controller_config = "cmd /c west build -p always -d build_fan_controller -b esp32s3_fan_controller/esp32s3/procpu app/fan_controller -- -DBOARD_ROOT=%PIXI_PROJECT_ROOT%"
fan_controller_build = "cmd /c west build -d build_fan_controller -b esp32s3_fan_controller/esp32s3/procpu app/fan_controller -- -DBOARD_ROOT=%PIXI_PROJECT_ROOT%"
fan_controller_clean = "west build -d build_fan_controller -t pristine"
fan_controller_flash = "cmd /c \"if not defined FANCTL_PORT set FANCTL_PORT=COM9 && call esptool --chip esp32s3 --port %%FANCTL_PORT%% --baud 921600 --before default-reset --after hard-reset write-flash -u --flash-mode dio --flash-freq 80m --flash-size 16MB 0x0 build_fan_controller/zephyr/zephyr.bin\""
fan_controller_erase = "cmd /c \"if not defined FANCTL_PORT set FANCTL_PORT=COM9 && call esptool --chip esp32s3 --port %%FANCTL_PORT%% --baud 921600 erase-flash\""
fan_controller_deploy = { depends-on = ["fan_controller_build", "fan_controller_flash"] }
fan_controller_deploy_clean = { depends-on = ["fan_controller_config", "fan_controller_flash"] }
fan_controller_c = { depends-on = ["fan_controller_config"] }
fan_controller = { depends-on = ["fan_controller_build"] }
parking_lock_cloud = "python app/parking_lock_cloud/run_embedded_server.py --host 0.0.0.0 --port 8880 --mqtt-host 127.0.0.1 --mqtt-port 1883 --embed-host 0.0.0.0 --mqtt-user user --mqtt-password user --reload"
parking_lock_cloud_prod = "python app/parking_lock_cloud/run_embedded_server.py --host 0.0.0.0 --port 8881 --mqtt-host 127.0.0.1 --mqtt-port 1883 --embed-host 0.0.0.0 --mqtt-user user --mqtt-password user"
mqtt_local_setup = "python tools/mqtt/setup_local_broker.py"
mqtt_local = { depends-on = ["mqtt_local_setup"], cmd = "python tools/mqtt/run_local_broker.py" }

[dependencies]
python = "==3.12"
mosquitto = ">=2.0.15,<3"

[pypi-dependencies]
west = ">=0.14.0"
pyelftools = ">=0.29"
pyyaml = ">=6.0"
pykwalify = "*"
jsonschema = "*"
canopen = "*"
packaging = "*"
patool = ">=2.0.0"
psutil = ">=5.6.6"
pylink-square = "*"
pyserial = ">=3.5, <4"
requests = ">=2.32.4"
semver = "*"
tqdm = ">=4.67.1"
reuse = "*"
anytree = "*"
intelhex = "*"
windows-curses = { version = "*", env-markers = "sys_platform == 'win32'" }
colorama = "*"
ply = ">=3.10"
gcovr = ">=6.0"
coverage = "*"
pytest = "*"
mypy = "*"
junitparser = ">=4.0.1"
python-dotenv = "*"
pyocd = ">=0.36.0"
tabulate = "*"
natsort = "*"
cbor = ">=1.0.0"
python-can = ">=4.3.0"
spdx-tools = "*"
opencv-python = ">=4.9.0.80"
numpy = ">=1.26.4"
gitpython = ">=3.1.41"
plotly = "*"
gitlint-core = "*"
junit2html = "*"
lpc-checksum = "*"
spsdk = ">=3.0.0"
pillow = ">=10.3.0"
pygithub = "*"
graphviz = "*"
clang-format = ">=15.0.0"
lxml = ">=5.3.0"
pylint = ">=3"
python-magic-bin = { version = "*", env-markers = "sys_platform == 'win32'" }
