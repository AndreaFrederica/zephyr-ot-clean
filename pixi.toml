[workspace]
authors = ["AndreaFrederica <andreafrederica@outlook.com>"]
channels = ["conda-forge"]
name = "zephyr-ot"
platforms = ["win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "==3.12"

[pypi-dependencies]
west = ">=0.14.0"
pyelftools = ">=0.29"
pyyaml = ">=6.0"
pykwalify = "*"
jsonschema = "*"
canopen = "*"
packaging = "*"
patool = ">=2.0.0"
psutil = ">=5.6.6"
pylink-square = "*"
pyserial = "*"
requests = ">=2.32.4"
semver = "*"
tqdm = ">=4.67.1"
reuse = "*"
anytree = "*"
intelhex = "*"
windows-curses = { version = "*", env-markers = "sys_platform == 'win32'" }
colorama = "*"
ply = ">=3.10"
gcovr = ">=6.0"
coverage = "*"
pytest = "*"
mypy = "*"
junitparser = ">=4.0.1"
python-dotenv = "*"
pyocd = ">=0.36.0"
tabulate = "*"
natsort = "*"
cbor = ">=1.0.0"
python-can = ">=4.3.0"
spdx-tools = "*"
opencv-python = ">=4.9.0.80"
numpy = ">=1.26.4"
gitpython = ">=3.1.41"
plotly = "*"
gitlint-core = "*"
junit2html = "*"
lpc-checksum = "*"
spsdk = ">=3.0.0"
pillow = ">=10.3.0"
pygithub = "*"
graphviz = "*"
clang-format = ">=15.0.0"
lxml = ">=5.3.0"
pylint = ">=3"
python-magic-bin = { version = "*", env-markers = "sys_platform == 'win32'" }
python-magic = { version = "*", env-markers = "sys_platform != 'win32'" }
ruff = "==0.14.2"
sphinx-lint = "*"
unidiff = "*"
vermin = "*"
yamllint = "*"
esptool = ">=5.0.2"
imgtool = ">=2.2.0"
grpcio-tools = "==1.68.0"
setuptools = ">=66.1.0"
